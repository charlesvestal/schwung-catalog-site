name: Update catalog and download counts

on:
  schedule:
    - cron: '0 * * * *'  # Hourly
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch module catalog
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/charlesvestal/schwung/main/module-catalog.json" \
            -o data/module-catalog.json

      - name: Fetch download counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '{' > data/download-counts.json

          # Parse module repos from catalog
          repos=$(jq -r '.modules[] | "\(.id)|\(.github_repo)"' data/module-catalog.json)

          first=true
          while IFS='|' read -r id repo; do
            [ -z "$repo" ] && continue

            # Get total downloads across all releases
            count=$(gh api "repos/${repo}/releases" --jq '[.[].assets[].download_count] | add // 0' 2>/dev/null || echo "0")

            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> data/download-counts.json
            fi
            printf '  "%s": %s' "$id" "$count" >> data/download-counts.json

          done <<< "$repos"

          echo '' >> data/download-counts.json
          echo '}' >> data/download-counts.json

          # Validate JSON
          jq . data/download-counts.json > /dev/null

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '{' > data/release-metadata.json

          repos=$(jq -r '.modules[] | "\(.id)|\(.github_repo)"' data/module-catalog.json)

          first=true
          while IFS='|' read -r id repo; do
            [ -z "$repo" ] && continue

            # Get all releases sorted by date
            releases=$(gh api "repos/${repo}/releases" --jq 'sort_by(.published_at)' 2>/dev/null || echo "[]")

            first_date=$(echo "$releases" | jq -r '.[0].published_at // empty' | cut -c1-10)
            [ -z "$first_date" ] && first_date="unknown"

            latest_date=$(echo "$releases" | jq -r '.[-1].published_at // empty' | cut -c1-10)
            [ -z "$latest_date" ] && latest_date="unknown"

            latest_version=$(echo "$releases" | jq -r '.[-1].tag_name // empty')
            [ -z "$latest_version" ] && latest_version="unknown"

            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> data/release-metadata.json
            fi
            printf '  "%s": {"first_release": "%s", "last_updated": "%s", "version": "%s"}' \
              "$id" "$first_date" "$latest_date" "$latest_version" >> data/release-metadata.json

          done <<< "$repos"

          echo '' >> data/release-metadata.json
          echo '}' >> data/release-metadata.json

          jq . data/release-metadata.json > /dev/null

      - name: Update download count history
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          HISTORY_FILE=data/download-counts-history.json

          # Initialize history if missing
          if [ ! -f "$HISTORY_FILE" ] || ! jq . "$HISTORY_FILE" > /dev/null 2>&1; then
            echo '{}' > "$HISTORY_FILE"
          fi

          # Add today's counts to history
          jq --arg date "$TODAY" --slurpfile counts data/download-counts.json \
            '. + {($date): $counts[0]}' "$HISTORY_FILE" > tmp-history.json

          # Prune entries older than 35 days (supports 30-day lookback)
          CUTOFF=$(date -u -d "35 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-35d +%Y-%m-%d)
          jq --arg cutoff "$CUTOFF" 'to_entries | map(select(.key >= $cutoff)) | from_entries' \
            tmp-history.json > "$HISTORY_FILE"
          rm tmp-history.json

      - name: Build audio preview list
        run: |
          # Generate list of available audio previews
          echo -n 'window.AUDIO_PREVIEWS = [' > data/audio-previews.js
          first=true
          for f in audio/*.mp3; do
            [ -f "$f" ] || continue
            id=$(basename "$f" .mp3)
            if [ "$first" = true ]; then
              first=false
            else
              echo -n ',' >> data/audio-previews.js
            fi
            echo -n "\"$id\"" >> data/audio-previews.js
          done
          echo '];' >> data/audio-previews.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "Update catalog and download counts"
          git push
