name: Update catalog and download counts

on:
  schedule:
    - cron: '0 * * * *'  # Hourly
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch module catalog
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/charlesvestal/schwung/main/module-catalog.json" \
            -o data/module-catalog.json

      - name: Fetch download counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '{' > data/download-counts.json

          # Parse module repos from catalog
          repos=$(jq -r '.modules[] | "\(.id)|\(.github_repo)"' data/module-catalog.json)

          first=true
          while IFS='|' read -r id repo; do
            [ -z "$repo" ] && continue

            # Get total downloads across all releases
            count=$(gh api "repos/${repo}/releases" --jq '[.[].assets[].download_count] | add // 0' 2>/dev/null || echo "0")

            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> data/download-counts.json
            fi
            printf '  "%s": %s' "$id" "$count" >> data/download-counts.json

          done <<< "$repos"

          echo '' >> data/download-counts.json
          echo '}' >> data/download-counts.json

          # Validate JSON
          jq . data/download-counts.json > /dev/null

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '{' > data/release-metadata.json

          repos=$(jq -r '.modules[] | "\(.id)|\(.github_repo)"' data/module-catalog.json)

          first=true
          while IFS='|' read -r id repo; do
            [ -z "$repo" ] && continue

            # Get all releases sorted by date
            releases=$(gh api "repos/${repo}/releases" --jq 'sort_by(.published_at)' 2>/dev/null || echo "[]")

            first_date=$(echo "$releases" | jq -r '.[0].published_at // empty' | cut -c1-10)
            [ -z "$first_date" ] && first_date="unknown"

            latest_date=$(echo "$releases" | jq -r '.[-1].published_at // empty' | cut -c1-10)
            [ -z "$latest_date" ] && latest_date="unknown"

            latest_version=$(echo "$releases" | jq -r '.[-1].tag_name // empty')
            [ -z "$latest_version" ] && latest_version="unknown"

            # Collect all release dates as JSON array
            all_dates=$(echo "$releases" | jq -c '[.[].published_at | . [:10]] | map(select(. != null))')
            [ -z "$all_dates" ] || [ "$all_dates" = "null" ] && all_dates="[]"

            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> data/release-metadata.json
            fi
            printf '  "%s": {"first_release": "%s", "last_updated": "%s", "version": "%s", "release_dates": %s}' \
              "$id" "$first_date" "$latest_date" "$latest_version" "$all_dates" >> data/release-metadata.json

          done <<< "$repos"

          echo '' >> data/release-metadata.json
          echo '}' >> data/release-metadata.json

          jq . data/release-metadata.json > /dev/null

      - name: Fetch installer release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release=$(gh api "repos/charlesvestal/schwung-installer/releases/latest" 2>/dev/null || echo "{}")
          version=$(echo "$release" | jq -r '.tag_name // empty')
          html_url=$(echo "$release" | jq -r '.html_url // empty')
          published_at=$(echo "$release" | jq -r '.published_at // empty' | cut -c1-10)

          # Per-platform / per-arch asset URLs (substring match on asset names)
          mac_arm64_url=$(echo "$release" | jq -r '[.assets[]? | select(.name | test("mac-arm64"))] | .[0].browser_download_url // empty')
          mac_x64_url=$(echo "$release" | jq -r '[.assets[]? | select(.name | test("mac-x64"))] | .[0].browser_download_url // empty')
          win_x64_url=$(echo "$release" | jq -r '[.assets[]? | select(.name | test("win-x64"))] | .[0].browser_download_url // empty')
          win_arm64_url=$(echo "$release" | jq -r '[.assets[]? | select(.name | test("win-arm64"))] | .[0].browser_download_url // empty')
          linux_amd64_url=$(echo "$release" | jq -r '[.assets[]? | select(.name | test("linux-amd64"))] | .[0].browser_download_url // empty')
          linux_arm64_url=$(echo "$release" | jq -r '[.assets[]? | select(.name | test("linux-arm64"))] | .[0].browser_download_url // empty')

          if [ -z "$version" ]; then
            version="unknown"
            html_url="https://github.com/charlesvestal/schwung-installer/releases/latest"
          fi

          jq -n \
            --arg version "$version" \
            --arg html_url "$html_url" \
            --arg published_at "$published_at" \
            --arg mac_arm64_url "$mac_arm64_url" \
            --arg mac_x64_url "$mac_x64_url" \
            --arg win_x64_url "$win_x64_url" \
            --arg win_arm64_url "$win_arm64_url" \
            --arg linux_amd64_url "$linux_amd64_url" \
            --arg linux_arm64_url "$linux_arm64_url" \
            '{version: $version, html_url: $html_url, published_at: $published_at, mac_arm64_url: $mac_arm64_url, mac_x64_url: $mac_x64_url, win_x64_url: $win_x64_url, win_arm64_url: $win_arm64_url, linux_amd64_url: $linux_amd64_url, linux_arm64_url: $linux_arm64_url}' \
            > data/installer-release.json

          jq . data/installer-release.json > /dev/null

      - name: Fetch Schwung host release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release=$(gh api "repos/charlesvestal/schwung/releases/latest" 2>/dev/null || echo "{}")
          version=$(echo "$release" | jq -r '.tag_name // empty')
          html_url=$(echo "$release" | jq -r '.html_url // empty')
          published_at=$(echo "$release" | jq -r '.published_at // empty' | cut -c1-10)

          if [ -z "$version" ]; then
            version="unknown"
            html_url="https://github.com/charlesvestal/schwung/releases/latest"
          fi

          jq -n \
            --arg version "$version" \
            --arg html_url "$html_url" \
            --arg published_at "$published_at" \
            '{version: $version, html_url: $html_url, published_at: $published_at}' \
            > data/schwung-release.json

          jq . data/schwung-release.json > /dev/null

      - name: Update download count history
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          HISTORY_FILE=data/download-counts-history.json

          # Initialize history if missing
          if [ ! -f "$HISTORY_FILE" ] || ! jq . "$HISTORY_FILE" > /dev/null 2>&1; then
            echo '{}' > "$HISTORY_FILE"
          fi

          # Add today's counts to history
          jq --arg date "$TODAY" --slurpfile counts data/download-counts.json \
            '. + {($date): $counts[0]}' "$HISTORY_FILE" > tmp-history.json

          # Prune entries older than 35 days (supports 30-day lookback)
          CUTOFF=$(date -u -d "35 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-35d +%Y-%m-%d)
          jq --arg cutoff "$CUTOFF" 'to_entries | map(select(.key >= $cutoff)) | from_entries' \
            tmp-history.json > "$HISTORY_FILE"
          rm tmp-history.json

      - name: Fetch module preview audio
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pulls a `preview.mp3` or `preview.m4a` asset from each module's
          # latest GitHub release into audio/<id>.<ext>. Only fetches when
          # no local file exists (in either format), so manually-committed
          # previews are sticky and authors can fill gaps by attaching
          # preview.mp3 / preview.m4a to their releases.
          mkdir -p audio
          repos=$(jq -r '.modules[] | "\(.id)|\(.github_repo)"' data/module-catalog.json)
          while IFS='|' read -r id repo; do
            [ -z "$repo" ] && continue
            [ -f "audio/${id}.mp3" ] && continue
            [ -f "audio/${id}.m4a" ] && continue
            for ext in m4a mp3; do
              url=$(gh api "repos/${repo}/releases/latest" \
                --jq ".assets[]? | select(.name == \"preview.${ext}\") | .browser_download_url" \
                2>/dev/null | head -1)
              [ -z "$url" ] && continue
              echo "Fetching preview.${ext} for ${id} from ${repo}"
              curl -sSfL -o "audio/${id}.${ext}" "$url" || { rm -f "audio/${id}.${ext}"; continue; }
              break
            done
          done <<< "$repos"

      - name: Build audio preview list
        run: |
          # Map each module id to the extension of its preview file (mp3 or m4a)
          echo -n 'window.AUDIO_PREVIEWS = {' > data/audio-previews.js
          first=true
          for f in audio/*.mp3 audio/*.m4a; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            ext="${base##*.}"
            id="${base%.*}"
            if [ "$first" = true ]; then
              first=false
            else
              echo -n ',' >> data/audio-previews.js
            fi
            printf '"%s":"%s"' "$id" "$ext" >> data/audio-previews.js
          done
          echo '};' >> data/audio-previews.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "Update catalog and download counts"
          git push
